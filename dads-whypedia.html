<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dads Whypedia Generator | AJ CloudTech</title>
    <link rel="canonical" href="https://ajcloudtech.in/dads-whypedia.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tool-container { max-width: 700px; margin: 40px auto; }
        .input-box { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 20px; font-family: 'Inter', sans-serif;}
        .input-box:focus { border-color: var(--primary); outline: none; }
        .result-box { background: #f8fafc; padding: 25px; border-radius: 8px; margin-top: 30px; border: 1px solid #e2e8f0; display: none; white-space: pre-wrap; font-size: 1.05rem; line-height: 1.8;}
        .loader { display: none; text-align: center; margin-top: 20px; color: var(--primary); font-weight: bold;}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">AJ <span class="highlight">CloudTech</span></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/tools.html" class="active">Tools</a></li>
                <li><a href="/blog.html">Blog</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero" style="padding: 60px 20px;">
        <div class="hero-content">
            <span class="badge">Powered by Llama-3 AI</span>
            <h1>Dads <span class="gradient-text">Whypedia</span></h1>
            <p>Generate fun, educational content to answer your kid's toughest "Why?" questions.</p>
        </div>
    </header>

    <main class="container tool-container">
        <div class="card">
            <h3 style="margin-bottom: 15px;">Ask the Dad AI</h3>
            
            <div id="emailGroup" style="margin-bottom: 15px;">
                <label style="font-size: 0.9rem; color: var(--text-muted); font-weight: bold;">Unlock Access (Free)</label>
                <input type="email" id="emailInput" class="input-box" style="margin-bottom: 0; margin-top: 5px;" placeholder="Enter your email to generate...">
            </div>

            <input type="text" id="questionInput" class="input-box" placeholder="e.g., Why is the sky blue?">
            
            <button id="generateBtn" class="btn btn-primary" style="width: 100%; justify-content: center;">
                Generate Script <i class="fas fa-magic"></i>
            </button>

            <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> Dad is thinking...</div>
            <div id="errorBox" style="display: none; color: #ef4444; background: #fee2e2; padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: 600; text-align: center;"></div>
            
            <div id="resultBox" class="result-box"></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailGroup = document.getElementById('emailGroup');
            const savedEmail = localStorage.getItem('ajcloudtech_email');
            
            // If we already have their email, hide the email box!
            if (savedEmail) {
                emailGroup.style.display = 'none';
            }
        });

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const question = document.getElementById('questionInput').value;
            const emailInput = document.getElementById('emailInput').value;
            const savedEmail = localStorage.getItem('ajcloudtech_email');
            
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('generateBtn');

            // Validation
            if (!question) return alert("Please enter a question!");
            if (!savedEmail && !emailInput) return alert("Please enter your email to use the tool.");

            // Use saved email if available, otherwise use what they typed
            const finalEmail = savedEmail || emailInput;

            // UI Loading state
            btn.style.display = 'none';
            loader.style.display = 'block';
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';

            try {
                const WORKER_URL = "https://dads-whypedia-api.abhijit-cloudtech.workers.dev"; 
                
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        question: question,
                        email: finalEmail
                    })
                });

                const data = await response.json();

                // Handle Rate Limits (429) or other errors
                if (!response.ok) {
                    throw new Error(data.error || "An error occurred.");
                }

                // Success! Save the email to local storage so they never see the box again
                if (!savedEmail && emailInput) {
                    localStorage.setItem('ajcloudtech_email', emailInput);
                    document.getElementById('emailGroup').style.display = 'none';
                }

                resultBox.innerText = data.result;
                resultBox.style.display = 'block';

            } catch (error) {
                errorBox.innerText = error.message;
                errorBox.style.display = 'block';
            } finally {
                btn.style.display = 'flex';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
