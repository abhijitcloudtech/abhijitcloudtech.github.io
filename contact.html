<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | AJ CloudTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-xl font-bold text-indigo-600 tracking-tight">
                        AJ <span class="text-gray-800 font-medium tracking-normal">CloudTech</span>
                    </a>
                </div>

                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-gray-600 hover:text-indigo-600 transition">Home</a>
                    <a href="blog.html" class="text-gray-600 hover:text-indigo-600 transition">Blog</a>
                    <a href="tools.html" class="text-gray-600 hover:text-indigo-600 transition">AI Tools</a>
                    <a href="contact.html" class="text-indigo-600 font-semibold border-b-2 border-indigo-600 pb-1">Contact</a>
                </div>

                <div class="md:hidden flex items-center">
                    <button class="outline-none mobile-menu-button">
                        <svg class="w-6 h-6 text-gray-500" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" stroke="currentColor">
                            <path d="4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Let's Connect</h1>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto">
                Have a question about my **AI tools**, **automated blogging system**, or just want to talk tech? I'm always open to new ideas.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 bg-white rounded-2xl shadow-xl overflow-hidden">
            
            <div class="bg-indigo-700 p-10 text-white">
                <h3 class="text-2xl font-bold mb-6">Contact Information</h3>
                <div class="space-y-6">
                    <div class="flex items-center space-x-4">
                        <i class="fas fa-envelope text-indigo-200"></i>
                        <span>hello@ajcloudtech.in</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <i class="fas fa-globe text-indigo-200"></i>
                        <span>ajcloudtech.in</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <i class="fas fa-map-marker-alt text-indigo-200"></i>
                        <span>Remote / Global</span>
                    </div>
                </div>

                <div class="mt-12 flex space-x-4 text-2xl">
                    <a href="#" class="hover:text-indigo-200"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="hover:text-indigo-200"><i class="fab fa-github"></i></a>
                    <a href="#" class="hover:text-indigo-200"><i class="fab fa-twitter"></i></a>
                </div>
            </div>

            <div class="md:col-span-2 p-10">
                <form action="https://formspree.io/f/xreodqwe" method="POST" class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Name</label>
                            <input type="text" name="name" required class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Email Address</label>
                            <input type="email" name="email" required class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Subject / Category</label>
                        <select name="inquiry_type" class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            <option value="General">General Inquiry</option>
                            <option value="AI Tools">AI Tool Support</option>
                            <option value="Partnership">Blog Partnership</option>
                            <option value="Tech Support">Developer / API Query</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Message</label>
                        <textarea name="message" rows="5" required class="mt-1 w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="How can I help you?"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg hover:bg-indigo-700 transform hover:-translate-y-1 transition-all shadow-lg active:scale-95">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-8 text-center text-gray-500 text-sm border-t bg-white">
        &copy; 2024 AJ CloudTech. Built with ❤️ and AI.
    </footer>

</body>
</html>
